name: Benchmark

on:
  push:
    branches: [main]
    paths: [src/benchmark/**, src/harness/**]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - run: yarn install && yarn build

      - run: npx playwright install chromium --with-deps

      - id: benchmark
        run: yarn benchmark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF: ${{ github.ref }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Cleanup and prepare the benchmark project for upload
        run: cd ${{ steps.benchmark.outputs.project_dir }} && git init && git clean -Xdf && rm -rf .git

      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-project
          path: ${{ steps.benchmark.outputs.project_dir }}
          include-hidden-files: true

      - run: yarn build:website
        if: github.ref == 'refs/heads/main'

      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          path: .website-dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
