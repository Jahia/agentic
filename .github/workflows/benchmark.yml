name: Benchmark

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: yarn install && yarn build
      - run: npx playwright install chromium --with-deps
      - run: yarn benchmark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
